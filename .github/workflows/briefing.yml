# First Read — daily briefing pipeline.
#
# fetch → extract → cluster → bodies → diff → write → fix → validate → render,
# then a transactional commit-back. Fail-soft:
#   - a min-source floor (fetch/extract exit 2) aborts the publish but still commits
#     the failure record in last-run-status.json (yesterday's page stays up).
#   - a fatal validation triggers one writer retry, then a degraded links-only publish
#     — never a stale page.

name: First Read

on:
  # ~5:25am EDT. GH cron drift (5-40 min) is accepted in v1 (design §5).
  schedule:
    - cron: '25 9 * * *'
  workflow_dispatch:

# Single in-flight run. cancel-in-progress is FALSE: the pipeline commits state
# transactionally and cancelling mid-commit could corrupt state/.
concurrency:
  group: first-read-briefing
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ZYTE_API_KEY: ${{ secrets.ZYTE_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      # One pipeline step so the floor-abort / retry / degraded control flow lives in
      # one place. On success it touches `.published` to authorize the commit step to
      # publish the briefing + promote state; on a floor abort it exits 0 without it
      # (status-only commit, yesterday's page preserved).
      - name: Run pipeline
        run: |
          set +e
          node fetch.js;   if [ $? -eq 2 ]; then echo "::warning::min-source floor — aborting publish"; exit 0; fi
          node extract.js; if [ $? -eq 2 ]; then echo "::warning::candidate floor — aborting publish"; exit 0; fi
          node cluster.js || exit 1
          node bodies.js  || exit 1
          node diff.js    || exit 1

          node write.js && node fix.js
          node validate.js; v=$?
          if [ $v -eq 1 ]; then
            echo "::warning::Fatal validation — retrying writer once with feedback"
            export RETRY_FEEDBACK="$(cat validation-errors.txt)"
            node write.js && node fix.js
            node validate.js; v=$?
          fi
          if [ $v -eq 1 ]; then
            echo "::warning::Still fatal after retry — publishing degraded page"
            node render.js --degraded "validation failed after retry"
          else
            node render.js
          fi
          touch .published
          exit 0

      # Always commit the run record; publish the briefing + promote threads only when
      # the pipeline authorized it (.published). Transactional: reset to remote first.
      - name: Commit and push
        if: always()
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git fetch origin main
          git reset --soft origin/main

          # Promote staged threads only when the pipeline authorized publishing.
          if [ -f .published ] && [ -f state/proposed-threads.json ]; then
            mv state/proposed-threads.json state/threads.json
          fi
          # Stage only files that exist — a missing optional artifact (e.g. no
          # index.html on a floor-abort) must never abort the status commit.
          for f in index.html briefing.md last-run-status.json state/threads.json state/zyte-escalation.json; do
            [ -f "$f" ] && git add "$f"
          done

          git diff --staged --quiet || {
            git commit -m "First Read $(date -u +%Y-%m-%d)"
            git push origin main
          }
